<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contratos · Bem Comum ERP · Módulo de Contratos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400..600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SVG icon library -->
<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <symbol id="i-search" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L13.5 13.5"/></symbol>
    <symbol id="i-plus" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3.5v9M3.5 8h9"/></symbol>
    <symbol id="i-eye" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 8s2.5-4.5 6.5-4.5S14.5 8 14.5 8 12 12.5 8 12.5 1.5 8 1.5 8z"/><circle cx="8" cy="8" r="2"/></symbol>
    <symbol id="i-more" viewBox="0 0 16 16" fill="currentColor"><circle cx="3.5" cy="8" r="1.3"/><circle cx="8" cy="8" r="1.3"/><circle cx="12.5" cy="8" r="1.3"/></symbol>
    <symbol id="i-check" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3.5 3.5L13 5"/></symbol>
    <symbol id="i-download" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8"/><path d="M4.5 7.5L8 11l3.5-3.5"/><path d="M3 13h10"/></symbol>
    <symbol id="i-doc" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2h5l3 3v9H4z"/><path d="M9 2v3h3"/></symbol>
    <symbol id="i-send" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2L7 9"/><path d="M14 2L9.5 14L7 9L2 6.5z"/></symbol>
    <symbol id="i-trash" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5h10"/><path d="M5.5 4.5V3a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v1.5"/><path d="M4.5 4.5l.7 8a1 1 0 0 0 1 .9h3.6a1 1 0 0 0 1-.9l.7-8"/></symbol>
    <symbol id="i-pencil" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 13.5l1-3 7.5-7.5 2 2-7.5 7.5-3 1z"/><path d="M9.5 4.5l2 2"/></symbol>
    <symbol id="i-calendar" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="3.5" width="11" height="10" rx="1"/><path d="M2.5 6.5h11"/><path d="M5.5 2v2.5M10.5 2v2.5"/></symbol>
    <symbol id="i-currency" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5.5a2.5 2.5 0 0 0-2.5-2H6.5a2 2 0 0 0 0 4h3a2 2 0 0 1 0 4H7a2.5 2.5 0 0 1-2.5-2"/><path d="M8 2v12"/></symbol>
    <symbol id="i-list" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 4.5h8"/><path d="M5.5 8h8"/><path d="M5.5 11.5h8"/><circle cx="3" cy="4.5" r="0.6" fill="currentColor"/><circle cx="3" cy="8" r="0.6" fill="currentColor"/><circle cx="3" cy="11.5" r="0.6" fill="currentColor"/></symbol>
  </defs>
</svg>

<div class="app">

  <!-- ═════════ TOPBAR ═════════ -->
  <header class="topbar">
    <button class="back" title="Voltar">←</button>
    <h1>Contratos</h1>
    <span class="count-chip" id="topbar-count">12 contratos</span>
  </header>

  <!-- ═════════ FILTER BAR ═════════ -->
  <div class="filter-bar">
    <div class="search">
      <span class="ic"><svg><use href="#i-search"/></svg></span>
      <input id="search-input" type="text" placeholder="Buscar por contratado, número, CNPJ ou objeto..." />
      <span class="kbd">⌘K</span>
    </div>

    <div class="status-chips" id="status-chips">
      <button class="chip active" data-status="todos">Todos <span class="cnt" id="cnt-todos">12</span></button>
      <button class="chip" data-status="rascunho">Rascunho <span class="cnt" id="cnt-rascunho">1</span></button>
      <button class="chip" data-status="em-andamento">Em andamento <span class="cnt" id="cnt-em-andamento">6</span></button>
      <button class="chip" data-status="a-vencer">A vencer <span class="cnt" id="cnt-a-vencer">2</span></button>
      <button class="chip" data-status="encerrado">Encerrado <span class="cnt" id="cnt-encerrado">2</span></button>
    </div>

    <div class="fbar-right">
      <div class="flt-wrap">
        <button class="flt add-filter" id="btn-add-filter"><span class="lbl">Filtro</span> Adicionar</button>
        <div class="add-filter-menu" id="menu-add-filter"></div>
      </div>

      <div class="flt-wrap">
        <button class="flt visoes" id="btn-visoes"><span class="lbl">Visões</span> Salvas</button>
        <div class="visoes-menu" id="menu-visoes"></div>
      </div>

      <div class="flt-wrap">
        <button class="flt" id="flt-sort"><span class="lbl">Ordenar</span> <span class="flt-val">Vigência ↑</span></button>
        <div class="flt-menu" id="menu-sort">
          <div class="label-group">Vigência</div>
          <button class="item is-active" data-sort="fim-asc">Vencendo primeiro</button>
          <button class="item" data-sort="fim-desc">Mais distante primeiro</button>
          <div class="sep"></div>
          <div class="label-group">Valor Atual</div>
          <button class="item" data-sort="valor-desc">Maior primeiro</button>
          <button class="item" data-sort="valor-asc">Menor primeiro</button>
          <div class="sep"></div>
          <div class="label-group">Contratado</div>
          <button class="item" data-sort="contratado-asc">A → Z</button>
          <button class="item" data-sort="contratado-desc">Z → A</button>
          <div class="sep"></div>
          <div class="label-group">Número</div>
          <button class="item" data-sort="num-desc">Mais recente primeiro</button>
          <button class="item" data-sort="num-asc">Mais antigo primeiro</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Active filter chips row (visible quando filtros avançados ativos) -->
  <div class="active-filters" id="active-filters">
    <span class="lbl-row">Filtros</span>
    <span id="chips-row"></span>
    <button class="clear-all" id="clear-all-filters">Limpar tudo</button>
  </div>

  <!-- ═════════ GRID ═════════ -->
  <div class="grid-wrap">

    <div class="grid-head">
      <span class="h sortable">Número</span>
      <span class="h sortable">Contratado</span>
      <span class="h">Objeto</span>
      <span class="h">Tipo</span>
      <span class="h">Programa</span>
      <span class="h right sortable">Valor Atual</span>
      <span class="h">Início</span>
      <span class="h sort-asc">Vigência</span>
      <span class="h right">Aditivos</span>
      <span class="h">Status</span>
    </div>

    <div id="grid-body"></div>

    <div class="grid-foot" id="grid-foot">
      <div class="ft-label">Total · <span id="ft-count">0</span> contratos</div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div class="ft-val ft-valor" id="ft-valor">R$ 0,00</div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>

  </div>

  <!-- ═════════ BOTTOMBAR ═════════ -->
  <footer class="bottombar">
    <div class="pag">
      <span class="range" id="pag-range">1–12 de 47</span>
      <span>·</span>
      <span>12 por página</span>
      <div class="nav">
        <button title="Página anterior" disabled>‹</button>
        <button title="Próxima página">›</button>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary">
        <svg><use href="#i-plus"/></svg>
        Novo Contrato
        <span class="kbd">⌘N</span>
      </button>
    </div>
  </footer>

</div>

<!-- ═══════════ DRAWER — Detalhes do Contrato ═══════════ -->
<aside class="drawer" id="drawer" aria-hidden="true">
  <header class="drawer-head">
    <div class="titles">
      <span class="overline">Detalhes do Contrato</span>
      <h2 id="drawer-doc-id">—</h2>
    </div>
    <button class="close-btn" id="drawer-close" title="Fechar (Esc)">×</button>
  </header>
  <div class="drawer-body" id="drawer-body"></div>
  <footer class="drawer-foot">
    <button class="btn btn-secondary" id="drawer-edit">
      <svg><use href="#i-pencil"/></svg>
      Editar contrato
    </button>
    <button class="btn btn-primary" id="drawer-close-2">Fechar</button>
  </footer>
</aside>

<div class="toast" id="toast"></div>

<script src="app.js" defer></script>

</body>
</html>
