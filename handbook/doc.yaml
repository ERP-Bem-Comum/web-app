openapi: 3.1.0

# ─────────────────────────────────────────────────────────────────────────────
# Bem Comum ERP · core-api · Módulo de Contratos
#
# Esta spec é o contrato HTTP que o front consumir das telas:
#   - "Novo Contrato"          (Anexo/index(1).html)
#   - "Detalhe do Contrato"    (Anexo/index.html, com lista de aditivos + modal)
#
# Convenções:
#   - x-status: available  → use case já existe no backend (src/modules/contracts/application/use-cases/*).
#                            Mock no front é seguro porque a forma do payload é estável.
#   - x-status: planned    → o recurso aparece na tela mas o backend ainda NÃO tem domínio
#                            modelado (ex.: Contratado/Counterparty, Programa, Plano Orçamentário,
#                            dados bancários). Front pode trabalhar contra mock; backend abre
#                            novos módulos/ADRs antes de implementar.
#
# Source of truth do domínio:
#   - src/modules/contracts/domain/contract/types.ts
#   - src/modules/contracts/domain/amendment/types.ts
#   - src/modules/contracts/application/use-cases/*.ts
#   - handbook/domain/contratos/
#
# IMPORTANTE: ainda não existe servidor HTTP rodando (ADR-0009 mantém CLI como UX
# primária). O endpoint Fastify só sobe depois do ADR de adoção HTTP ser aceito.
# Esta spec é o ARTEFATO de design que orienta tanto o ADR quanto o front.
# ─────────────────────────────────────────────────────────────────────────────

info:
  title: Bem Comum ERP · Contracts API
  description: |
    API HTTP do módulo de Contratos do core-api. Cobre criação de contrato,
    aditivos (Addition / Suppression / TermChange / Misc), anexação de
    documento assinado, homologação e leitura.

    **Idioma das mensagens de erro:** PT-BR (humanas).
    **`code` do erro:** EN kebab-case (mesma string literal union do domínio).
    **Valores monetários:** sempre em centavos (`integer`), nunca em real (`number`).
    **Datas:** ISO 8601 (`date-time` para timestamps, `date` para dia civil sem hora).
    **IDs:** UUID v4.
  version: 0.1.0-draft
  contact:
    name: Bem Comum ERP — Time core-api
  license:
    name: Proprietary

servers:
  - url: http://localhost:3000
    description: Dev local (Fastify, quando ativado)
  - url: https://api.bemcomum.org
    description: Produção (placeholder)

tags:
  - name: Contracts
    description: Contrato principal (originalValue/Period + currentValue/Period derivado).
  - name: Amendments
    description: Aditivos pertencentes a um contrato. 4 kinds, 2 status.
  - name: Documents
    description: Upload e signed URL de PDFs assinados (DocumentStorage port).
  - name: Counterparties
    description: |
      Contratado (PF/PJ) referenciado pelo contrato. **Planned** — Fase 1 do
      domínio não modela essa entidade; tela "Novo Contrato" depende dela.
  - name: Programs
    description: |
      Programa institucional (ex.: EPV, PFP, PIA). **Planned** — não modelado
      na Fase 1; tela "Novo Contrato" lista no campo Programa.
  - name: BudgetPlans
    description: |
      Plano orçamentário associado a um programa/ano. **Planned** — não
      modelado na Fase 1; tela "Novo Contrato" lista no campo Plano Orçamentário.

paths:

  # ════════════════════════════════════════════════════════════════════════════
  # CONTRACTS
  # ════════════════════════════════════════════════════════════════════════════

  /contracts:
    get:
      tags: [Contracts]
      summary: Lista contratos
      operationId: listContracts
      description: |
        Retorna todos os contratos. Paginação é mínima nesta versão (Fase 1
        retorna lista inteira; quando o volume justificar, adicionamos
        `?limit&cursor`).
      x-status: available
      x-source: src/modules/contracts/application/use-cases/list-contracts.ts
      parameters:
        - $ref: '#/components/parameters/Status'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractSummary'
                  total:
                    type: integer
                    minimum: 0
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Contracts]
      summary: Cria um contrato
      operationId: createContract
      description: |
        Cria contrato com **valor original** e **período original**. O estado
        vigente (`currentValue`, `currentPeriod`) é igual ao original até que
        um aditivo seja homologado (RN-06, RN-07).

        **Documento principal:** o campo `signedDocumentRef` é `x-status: planned`.
        Hoje o use case `createContract` não recebe documento; ele é anexado
        depois via fluxo separado. O front pode subir o PDF via `POST /documents`
        primeiro e passar o ID aqui quando o backend evoluir.

        **Counterparty, programa, plano, bancário:** todos `x-status: planned`.
        Não existem no domínio Fase 1. O front pode enviar mas o backend ignora
        até os módulos serem criados.
      x-source: src/modules/contracts/application/use-cases/create-contract.ts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractRequest'
            examples:
              minimal:
                summary: Mínimo Fase 1 (sem extras planned)
                value:
                  sequentialNumber: '0001/2026'
                  title: Assessoria técnica em desenvolvimento curricular
                  objective: Serviços de assessoria técnica em desenvolvimento curricular e acompanhamento pedagógico — Programa EPV.
                  signedAt: '2025-01-31'
                  originalValueCents: 18000000
                  originalPeriodStart: '2025-01-31'
                  originalPeriodEnd: '2025-12-31'
              completo:
                summary: Com extras das telas (planned)
                value:
                  sequentialNumber: '0001/2026'
                  title: Assessoria técnica em desenvolvimento curricular
                  objective: Serviços de assessoria técnica em desenvolvimento curricular e acompanhamento pedagógico — Programa EPV.
                  signedAt: '2025-01-31'
                  originalValueCents: 18000000
                  originalPeriodStart: '2025-01-31'
                  originalPeriodEnd: '2025-12-31'
                  signedDocumentRef: 8c1a8a2e-2d0f-4c3a-9b8d-1f3a55e98ab1
                  counterpartyId: 2e9a14de-2b75-4d35-9b94-3d8a4f0d2e10
                  contractType: Fornecedor
                  contractModel: Serviço
                  cooperativeAgreement: false
                  programId: 0e54e8a8-9b1f-4f87-8b9c-7a9f2d3c5a01
                  budgetPlanId: 0e54e8a8-9b1f-4f87-8b9c-7a9f2d3c5a02
      responses:
        '201':
          description: Criado
          headers:
            Location:
              schema: { type: string, format: uri }
              description: URI do contrato recém-criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contract'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 'Conflito (ex.: sequentialNumber duplicado)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                duplicated:
                  value:
                    code: contract-sequential-number-duplicated
                    message: Já existe contrato com este número sequencial.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /contracts/{contractId}:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    get:
      tags: [Contracts]
      summary: Detalhe de um contrato
      operationId: getContract
      description: |
        Retorna o contrato com todos os campos vigentes (current*) e a lista de
        IDs de aditivos homologados. Para detalhe dos aditivos, ver
        `GET /contracts/{contractId}/amendments`.
      x-status: available
      x-source: src/modules/contracts/application/use-cases/get-contract.ts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contract'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════════════════════════════════════════
  # AMENDMENTS
  # ════════════════════════════════════════════════════════════════════════════

  /contracts/{contractId}/amendments:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    get:
      tags: [Amendments]
      summary: Lista aditivos de um contrato
      operationId: listAmendments
      description: |
        Retorna todos os aditivos do contrato, do mais novo para o mais antigo
        (por `createdAt` desc). Inclui pendentes (não homologados).
      x-status: available
      x-source: src/modules/contracts/adapters/persistence/* (AmendmentRepository.listByContract)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Amendment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Amendments]
      summary: Cria um aditivo
      operationId: createAmendment
      description: |
        Cria um aditivo no status `Pending`. Para homologar (status
        `Homologated`), é necessário:
          1. Anexar o documento assinado (`POST /amendments/{id}/signed-document`).
          2. Homologar (`POST /amendments/{id}/homologation`).

        **Validações de domínio que retornam 409:**
          - `TermChange` com `newEndDate` ≤ `currentPeriod.end` → `create-amendment-term-change-not-extending`
          - `TermChange` quando `currentPeriod.kind === 'Indefinite'` → `create-amendment-cannot-extend-indefinite`
          - `Suppression` com `impactValueCents` > `currentValue.cents` → `amendment-suppression-exceeds-current-value`
      x-source: src/modules/contracts/application/use-cases/create-amendment.ts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAmendmentRequest'
            examples:
              addition:
                summary: Aditivo de valor (acréscimo)
                value:
                  kind: Addition
                  amendmentNumber: AD 01-001/2025
                  description: Acréscimo para inclusão de oficinas regionais (Sertão Central)
                  impactValueCents: 3535800
              suppression:
                summary: Aditivo de valor (supressão)
                value:
                  kind: Suppression
                  amendmentNumber: AD 02-001/2025
                  description: Supressão de etapa cancelada
                  impactValueCents: 500000
              termChange:
                summary: Aditivo de prazo
                value:
                  kind: TermChange
                  amendmentNumber: AD 02-001/2025
                  description: Prorrogação da vigência até 31/12/2026
                  newEndDate: '2026-12-31'
              misc:
                summary: Aditivo de escopo (sem impacto financeiro/prazo)
                value:
                  kind: Misc
                  amendmentNumber: AD 03-001/2026
                  description: Ajuste de plano de trabalho — inclusão de relatórios mensais
      responses:
        '201':
          description: Criado
          headers:
            Location:
              schema: { type: string, format: uri }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Amendment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /amendments/{amendmentId}:
    parameters:
      - $ref: '#/components/parameters/AmendmentId'
    get:
      tags: [Amendments]
      summary: Detalhe de um aditivo
      operationId: getAmendment
      x-status: available
      x-source: src/modules/contracts/adapters/persistence/* (AmendmentRepository.findById)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Amendment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /amendments/{amendmentId}/signed-document:
    parameters:
      - $ref: '#/components/parameters/AmendmentId'
    post:
      tags: [Amendments]
      summary: Anexa o documento assinado a um aditivo
      operationId: attachSignedDocument
      description: |
        Liga um documento já enviado via `POST /documents` ao aditivo, marcando
        `signedDocumentRef`. Pré-requisito para homologar (RN-12 do handbook).

        **Erros de estado:**
          - `amendment-document-already-attached` (já tem doc anexado) → 409
          - `amendment-not-pending` (já está homologado) → 409
      x-status: available
      x-source: src/modules/contracts/application/use-cases/attach-signed-document.ts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signedDocumentRef]
              properties:
                signedDocumentRef:
                  $ref: '#/components/schemas/DocumentId'
      responses:
        '200':
          description: Documento anexado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Amendment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /amendments/{amendmentId}/homologation:
    parameters:
      - $ref: '#/components/parameters/AmendmentId'
    post:
      tags: [Amendments]
      summary: Homologa um aditivo (aplica efeito no contrato)
      operationId: homologateAmendment
      description: |
        Muda o aditivo para status `Homologated` e aplica o efeito no contrato
        mãe (recalcula `currentValue` ou `currentPeriod`).

        Requer que o aditivo já tenha `signedDocumentRef` (RN-12).

        Publica 2 eventos: `AmendmentHomologated` e `ContractStateUpdated`.

        **`homologatedBy`:** UUID do usuário homologando (UserRef).
      x-source: src/modules/contracts/application/use-cases/homologate-amendment.ts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [homologatedBy]
              properties:
                homologatedBy:
                  $ref: '#/components/schemas/UserRef'
      responses:
        '200':
          description: Homologado
          content:
            application/json:
              schema:
                type: object
                required: [contract, amendment]
                properties:
                  contract:
                    $ref: '#/components/schemas/Contract'
                  amendment:
                    $ref: '#/components/schemas/Amendment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /amendments/{amendmentId}/signed-document/deletion:
    parameters:
      - $ref: '#/components/parameters/AmendmentId'
    post:
      tags: [Amendments]
      summary: Exclui o documento anexado a um aditivo (com motivo auditável)
      operationId: deleteSignedDocument
      description: |
        Remove o `signedDocumentRef` do aditivo e registra o motivo no histórico
        de auditoria (evento de domínio `AmendmentDocumentDeleted`).

        **Não apaga o binário do storage** — apenas desreferencia. O blob
        continua no bucket para auditoria.

        **Status:** `x-status: planned`. Modal de exclusão existe na tela
        (`modal-confirm-delete` em `Anexo/index.html`), mas o use case ainda
        não foi modelado. Requer:
          - novo evento de domínio `AmendmentDocumentDeleted`
          - novo erro `amendment-cannot-delete-after-homologation` (regra:
            só pode excluir se status === 'Pending')
      x-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 8
                  maxLength: 1000
                  description: Motivo da exclusão (fica registrado permanentemente no histórico).
      responses:
        '200':
          description: Documento desreferenciado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Amendment'

  # ════════════════════════════════════════════════════════════════════════════
  # DOCUMENTS (storage de PDFs assinados)
  # ════════════════════════════════════════════════════════════════════════════

  /documents:
    post:
      tags: [Documents]
      summary: Faz upload de um documento
      operationId: uploadDocument
      description: |
        Upload binário de um PDF assinado (até 20 MB conforme a tela).
        Retorna o `DocumentId` que pode ser usado em:
          - `POST /contracts` (campo `signedDocumentRef`, planned)
          - `POST /amendments/{id}/signed-document`

        **Integridade:** se `expectedSha256` for enviado, o adapter compara
        após upload e retorna erro `storage-integrity-mismatch` em caso de
        divergência.
      x-source: src/modules/contracts/application/ports/document-storage.ts (DocumentStorage.upload)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF assinado, ≤ 20 MB
                expectedSha256:
                  type: string
                  pattern: '^[a-f0-9]{64}$'
                  description: Hash SHA-256 hex esperado (opcional, casos críticos)
      responses:
        '201':
          description: Upload aceito
          content:
            application/json:
              schema:
                type: object
                required: [documentId, sizeBytes, sha256, mimeType]
                properties:
                  documentId:
                    $ref: '#/components/schemas/DocumentId'
                  sizeBytes:
                    type: integer
                    minimum: 0
                  sha256:
                    type: string
                    pattern: '^[a-f0-9]{64}$'
                  mimeType:
                    type: string
                    example: application/pdf
        '413':
          description: Payload muito grande (> 20 MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '502':
          description: Falha no storage backend (S3/MinIO indisponível)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /documents/{documentId}/signed-url:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
      - in: query
        name: ttlSeconds
        schema:
          type: integer
          minimum: 1
          maximum: 604800
          default: 900
        description: TTL da URL pré-assinada em segundos (máx 7 dias = 604800, limite AWS V4).
    get:
      tags: [Documents]
      summary: Gera URL pré-assinada para download do documento
      operationId: getDocumentSignedUrl
      x-source: src/modules/contracts/application/ports/document-storage.ts (DocumentStorage.signedUrl)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, expiresAt]
                properties:
                  url:
                    type: string
                    format: uri
                  expiresAt:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: TTL inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ════════════════════════════════════════════════════════════════════════════
  # COUNTERPARTIES (Contratado) — PLANNED
  # Necessário para tela "Novo Contrato" (busca por CNPJ/CPF/nome e auto-preenche
  # dados bancários). Não existe domínio na Fase 1.
  # ════════════════════════════════════════════════════════════════════════════

  /counterparties:
    get:
      tags: [Counterparties]
      summary: Busca contratado (autocomplete)
      operationId: searchCounterparties
      description: Busca por nome, fantasia, CNPJ ou CPF (mín. 3 chars).
      x-status: planned
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 3 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CounterpartySummary'

  /counterparties/{counterpartyId}:
    parameters:
      - in: path
        name: counterpartyId
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Counterparties]
      summary: Detalhe do contratado (com bancário + PIX)
      operationId: getCounterparty
      x-status: planned
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Counterparty'

  # ════════════════════════════════════════════════════════════════════════════
  # PROGRAMS + BUDGET PLANS — PLANNED
  # ════════════════════════════════════════════════════════════════════════════

  /programs:
    get:
      tags: [Programs]
      summary: Lista programas institucionais
      operationId: listPrograms
      x-status: planned
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Program'

  /budget-plans:
    get:
      tags: [BudgetPlans]
      summary: Lista planos orçamentários (filtra por programa)
      operationId: listBudgetPlans
      x-status: planned
      parameters:
        - in: query
          name: programId
          schema:
            type: string
            format: uuid
        - in: query
          name: year
          schema:
            type: integer
            minimum: 2020
            maximum: 2099
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BudgetPlan'

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────

components:

  # ── parameters ─────────────────────────────────────────────────────────────
  parameters:
    ContractId:
      in: path
      name: contractId
      required: true
      schema:
        $ref: '#/components/schemas/ContractId'
    AmendmentId:
      in: path
      name: amendmentId
      required: true
      schema:
        $ref: '#/components/schemas/AmendmentId'
    DocumentId:
      in: path
      name: documentId
      required: true
      schema:
        $ref: '#/components/schemas/DocumentId'
    Status:
      in: query
      name: status
      schema:
        $ref: '#/components/schemas/ContractStatus'
      description: Filtra por status do contrato (omitido → todos).

  # ── responses comuns ───────────────────────────────────────────────────────
  responses:
    BadRequest:
      description: Requisição inválida (formato de UUID, campos faltando, etc).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            invalidId:
              value:
                code: contract-id-invalid
                message: O identificador do contrato não é um UUID v4 válido.
    NotFound:
      description: Recurso não encontrado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            contractNotFound:
              value:
                code: contract-not-found
                message: Contrato não encontrado.
            amendmentNotFound:
              value:
                code: amendment-not-found
                message: Aditivo não encontrado.
    Conflict:
      description: Conflito de estado de negócio (regra de domínio violada).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            contractNotActive:
              value:
                code: contract-not-active
                message: O contrato não está em estado ativo.
            amendmentNotPending:
              value:
                code: amendment-not-pending
                message: O aditivo já foi homologado.
            termChangeNotExtending:
              value:
                code: create-amendment-term-change-not-extending
                message: A nova data-fim do aditivo precisa ser posterior à vigência atual.
            suppressionExceedsValue:
              value:
                code: amendment-suppression-exceeds-current-value
                message: A supressão excederia o valor vigente do contrato.
    UnprocessableEntity:
      description: Erro semântico (Money negativo, período inválido, etc).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            moneyNegative:
              value:
                code: money-negative
                message: Valor monetário não pode ser negativo.
            periodEndBeforeStart:
              value:
                code: period-end-before-start
                message: A data de fim do período é anterior à de início.
    InternalError:
      description: Erro interno do servidor.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  # ── schemas ────────────────────────────────────────────────────────────────
  schemas:

    # ─── IDs branded ────────────────────────────────────────────────────────
    ContractId:
      type: string
      format: uuid
      description: UUID v4 do contrato.
    AmendmentId:
      type: string
      format: uuid
      description: UUID v4 do aditivo.
    DocumentId:
      type: string
      format: uuid
      description: UUID v4 do documento no DocumentStorage.
    UserRef:
      type: string
      format: uuid
      description: UUID v4 do usuário (referência leve, futuro módulo Auth).

    # ─── Value Objects ──────────────────────────────────────────────────────
    Money:
      type: object
      description: |
        Valor monetário sempre em centavos (BRL). Nunca usar `number` decimal
        para evitar drift de ponto flutuante.
      required: [cents]
      properties:
        cents:
          type: integer
          minimum: 0
          example: 18000000
          description: 18000000 = R$ 180.000,00

    Period:
      oneOf:
        - $ref: '#/components/schemas/PeriodClosed'
        - $ref: '#/components/schemas/PeriodIndefinite'
      discriminator:
        propertyName: kind
        mapping:
          Closed: '#/components/schemas/PeriodClosed'
          Indefinite: '#/components/schemas/PeriodIndefinite'
    PeriodClosed:
      type: object
      required: [kind, start, end]
      properties:
        kind: { type: string, enum: [Closed] }
        start: { type: string, format: date }
        end: { type: string, format: date }
    PeriodIndefinite:
      type: object
      required: [kind, start]
      properties:
        kind: { type: string, enum: [Indefinite] }
        start: { type: string, format: date }

    ContractStatus:
      type: string
      enum: [Active, Expired, Terminated]
      description: |
        - **Active**: dentro da vigência, sem encerramento manual.
        - **Expired**: vigência terminou (data-fim < hoje).
        - **Terminated**: encerrado manualmente antes do fim.

    AmendmentKind:
      type: string
      enum: [Addition, Suppression, TermChange, Misc]
      description: |
        - **Addition**: acréscimo de valor.
        - **Suppression**: supressão de valor.
        - **TermChange**: prorrogação de prazo.
        - **Misc**: escopo/diversos, sem impacto financeiro/prazo.

    AmendmentStatus:
      type: string
      enum: [Pending, Homologated]

    # ─── Contract ───────────────────────────────────────────────────────────
    Contract:
      type: object
      required:
        - id
        - sequentialNumber
        - title
        - objective
        - signedAt
        - originalValue
        - originalPeriod
        - currentValue
        - currentPeriod
        - status
        - homologatedAmendmentIds
      properties:
        id: { $ref: '#/components/schemas/ContractId' }
        sequentialNumber:
          type: string
          example: '0001/2026'
        title: { type: string }
        objective: { type: string }
        signedAt: { type: string, format: date-time }
        originalValue: { $ref: '#/components/schemas/Money' }
        originalPeriod: { $ref: '#/components/schemas/Period' }
        currentValue:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          description: |
            Derivado: `originalValue + Σ aditivos homologados`. Nunca editado
            diretamente — recalculado pelo backend a cada homologação (RN-06).
        currentPeriod:
          allOf: [{ $ref: '#/components/schemas/Period' }]
          description: |
            Derivado: `originalPeriod` com `end` estendido pelo último
            `TermChange` homologado (RN-07).
        status: { $ref: '#/components/schemas/ContractStatus' }
        homologatedAmendmentIds:
          type: array
          items: { $ref: '#/components/schemas/AmendmentId' }
        endedAt:
          type: [string, 'null']
          format: date-time
          description: Quando `Terminated`, registra a data do término manual.

        # ─── Extras das telas (planned) ─────────────────────────────────────
        counterpartyId:
          $ref: '#/components/schemas/CounterpartyId'
          description: '**planned** — referência ao contratado.'
        contractType:
          type: string
          enum: [Fornecedor, Cliente]
          description: '**planned** — tela "Novo Contrato" exige.'
        contractModel:
          type: string
          enum: [Serviço, Produto, Misto]
          description: '**planned**'
        cooperativeAgreement:
          type: boolean
          description: '**planned** — campo "Acordo Cooperativo?"'
        programId:
          type: string
          format: uuid
          description: '**planned**'
        budgetPlanId:
          type: string
          format: uuid
          description: '**planned**'
        signedDocumentRef:
          allOf: [{ $ref: '#/components/schemas/DocumentId' }]
          description: '**planned** — documento principal do contrato base.'

    ContractSummary:
      type: object
      description: Versão enxuta usada em listagens.
      required: [id, sequentialNumber, title, currentValue, currentPeriod, status]
      properties:
        id: { $ref: '#/components/schemas/ContractId' }
        sequentialNumber: { type: string }
        title: { type: string }
        currentValue: { $ref: '#/components/schemas/Money' }
        currentPeriod: { $ref: '#/components/schemas/Period' }
        status: { $ref: '#/components/schemas/ContractStatus' }
        counterpartyName:
          type: string
          description: '**planned**'

    CreateContractRequest:
      type: object
      required:
        - sequentialNumber
        - title
        - objective
        - signedAt
        - originalValueCents
        - originalPeriodStart
      properties:
        sequentialNumber:
          type: string
          pattern: '^[0-9]{3,5}/[0-9]{4}$'
          example: '0001/2026'
        title:
          type: string
          minLength: 1
          maxLength: 255
        objective:
          type: string
          minLength: 1
        signedAt:
          type: string
          format: date
        originalValueCents:
          type: integer
          minimum: 1
        originalPeriodStart:
          type: string
          format: date
        originalPeriodEnd:
          type: [string, 'null']
          format: date
          description: Quando `null`, período é indefinido.

        # planned
        signedDocumentRef:
          allOf: [{ $ref: '#/components/schemas/DocumentId' }]
          description: '**planned**'
        counterpartyId:
          allOf: [{ $ref: '#/components/schemas/CounterpartyId' }]
          description: '**planned**'
        contractType:
          type: string
          enum: [Fornecedor, Cliente]
          description: '**planned**'
        contractModel:
          type: string
          enum: [Serviço, Produto, Misto]
          description: '**planned**'
        cooperativeAgreement:
          type: boolean
          description: '**planned**'
        programId:
          type: string
          format: uuid
          description: '**planned**'
        budgetPlanId:
          type: string
          format: uuid
          description: '**planned**'

    # ─── Amendment ──────────────────────────────────────────────────────────
    Amendment:
      oneOf:
        - $ref: '#/components/schemas/AmendmentAddition'
        - $ref: '#/components/schemas/AmendmentSuppression'
        - $ref: '#/components/schemas/AmendmentTermChange'
        - $ref: '#/components/schemas/AmendmentMisc'
      discriminator:
        propertyName: kind
        mapping:
          Addition: '#/components/schemas/AmendmentAddition'
          Suppression: '#/components/schemas/AmendmentSuppression'
          TermChange: '#/components/schemas/AmendmentTermChange'
          Misc: '#/components/schemas/AmendmentMisc'

    AmendmentBase:
      type: object
      required:
        - id
        - contractId
        - amendmentNumber
        - description
        - createdAt
        - status
        - kind
      properties:
        id: { $ref: '#/components/schemas/AmendmentId' }
        contractId: { $ref: '#/components/schemas/ContractId' }
        amendmentNumber:
          type: string
          example: AD 01-001/2025
        description: { type: string }
        createdAt: { type: string, format: date-time }
        status: { $ref: '#/components/schemas/AmendmentStatus' }
        signedDocumentRef:
          oneOf:
            - { $ref: '#/components/schemas/DocumentId' }
            - { type: 'null' }
        homologatedAt:
          type: [string, 'null']
          format: date-time
        homologatedBy:
          oneOf:
            - { $ref: '#/components/schemas/UserRef' }
            - { type: 'null' }

    AmendmentAddition:
      allOf:
        - $ref: '#/components/schemas/AmendmentBase'
        - type: object
          required: [kind, impactValue]
          properties:
            kind: { type: string, enum: [Addition] }
            impactValue: { $ref: '#/components/schemas/Money' }

    AmendmentSuppression:
      allOf:
        - $ref: '#/components/schemas/AmendmentBase'
        - type: object
          required: [kind, impactValue]
          properties:
            kind: { type: string, enum: [Suppression] }
            impactValue: { $ref: '#/components/schemas/Money' }

    AmendmentTermChange:
      allOf:
        - $ref: '#/components/schemas/AmendmentBase'
        - type: object
          required: [kind, newEndDate]
          properties:
            kind: { type: string, enum: [TermChange] }
            newEndDate: { type: string, format: date }

    AmendmentMisc:
      allOf:
        - $ref: '#/components/schemas/AmendmentBase'
        - type: object
          required: [kind]
          properties:
            kind: { type: string, enum: [Misc] }

    CreateAmendmentRequest:
      oneOf:
        - $ref: '#/components/schemas/CreateAmendmentAddition'
        - $ref: '#/components/schemas/CreateAmendmentSuppression'
        - $ref: '#/components/schemas/CreateAmendmentTermChange'
        - $ref: '#/components/schemas/CreateAmendmentMisc'
      discriminator:
        propertyName: kind
        mapping:
          Addition: '#/components/schemas/CreateAmendmentAddition'
          Suppression: '#/components/schemas/CreateAmendmentSuppression'
          TermChange: '#/components/schemas/CreateAmendmentTermChange'
          Misc: '#/components/schemas/CreateAmendmentMisc'

    CreateAmendmentCommon:
      type: object
      required: [amendmentNumber, description]
      properties:
        amendmentNumber:
          type: string
          example: AD 01-001/2025
        description:
          type: string
          minLength: 1

    CreateAmendmentAddition:
      allOf:
        - $ref: '#/components/schemas/CreateAmendmentCommon'
        - type: object
          required: [kind, impactValueCents]
          properties:
            kind: { type: string, enum: [Addition] }
            impactValueCents: { type: integer, minimum: 1 }

    CreateAmendmentSuppression:
      allOf:
        - $ref: '#/components/schemas/CreateAmendmentCommon'
        - type: object
          required: [kind, impactValueCents]
          properties:
            kind: { type: string, enum: [Suppression] }
            impactValueCents: { type: integer, minimum: 1 }

    CreateAmendmentTermChange:
      allOf:
        - $ref: '#/components/schemas/CreateAmendmentCommon'
        - type: object
          required: [kind, newEndDate]
          properties:
            kind: { type: string, enum: [TermChange] }
            newEndDate: { type: string, format: date }

    CreateAmendmentMisc:
      allOf:
        - $ref: '#/components/schemas/CreateAmendmentCommon'
        - type: object
          required: [kind]
          properties:
            kind: { type: string, enum: [Misc] }

    # ─── Counterparty / Program / BudgetPlan (planned) ──────────────────────
    CounterpartyId:
      type: string
      format: uuid

    CounterpartySummary:
      type: object
      description: '**planned** — usado no autocomplete da tela "Novo Contrato".'
      required: [id, kind, name, taxId]
      properties:
        id: { $ref: '#/components/schemas/CounterpartyId' }
        kind: { type: string, enum: [PJ, PF] }
        name: { type: string }
        tradeName:
          type: [string, 'null']
        taxId:
          type: string
          description: CNPJ (PJ) ou CPF (PF), apenas dígitos.

    Counterparty:
      allOf:
        - $ref: '#/components/schemas/CounterpartySummary'
        - type: object
          properties:
            bankAccount:
              $ref: '#/components/schemas/BankAccount'

    BankAccount:
      type: object
      description: '**planned** — dados bancários para pagamento ao contratado.'
      required: [bankCode, bankName, agency, account]
      properties:
        bankCode:
          type: string
          pattern: '^[0-9]{3}$'
          example: '077'
        bankName:
          type: string
          example: Banco Inter S.A.
        agency:
          type: string
          example: '0001-9'
        account:
          type: string
          example: '6433553'
        accountDigit:
          type: string
          example: '4'
        pix:
          $ref: '#/components/schemas/PixKey'

    PixKey:
      type: object
      description: '**planned**'
      required: [kind, value]
      properties:
        kind:
          type: string
          enum: [CNPJ, CPF, EMAIL, PHONE, EVP]
        value:
          type: string

    Program:
      type: object
      description: '**planned**'
      required: [id, code, name]
      properties:
        id: { type: string, format: uuid }
        code: { type: string, example: EPV }
        name: { type: string, example: EPV — Apoio Regional }

    BudgetPlan:
      type: object
      description: '**planned**'
      required: [id, programId, year, label]
      properties:
        id: { type: string, format: uuid }
        programId: { type: string, format: uuid }
        year: { type: integer, example: 2026 }
        label:
          type: string
          example: 2026 EPV 1.0 · Consultorias

    # ─── Error envelope ─────────────────────────────────────────────────────
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: |
            Identificador da falha em EN kebab-case (mesma string da union de
            erros do domínio). O front pode mapear `code` → mensagem custom.
          example: contract-not-active
        message:
          type: string
          description: Mensagem PT-BR para o usuário final.
          example: O contrato não está em estado ativo.
        details:
          type: object
          additionalProperties: true
          description: Contexto adicional (campos inválidos, valores observados, etc).
