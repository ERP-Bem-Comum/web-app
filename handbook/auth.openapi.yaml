openapi: 3.0.3
info:
  title: ERP Financeiro — Autenticação
  description: |
    API de autenticação do ERP Financeiro.
    Suporta login com credenciais (email/senha), logout e verificação de sessão
    via cookie HttpOnly com token JWT.
  version: 1.0.0
  contact:
    name: Time ERP Financeiro

servers:
  - url: http://localhost:4010
    description: Mock API local
  - url: http://localhost:3003
    description: Backend NestJS local
  - url: https://api.erp-financeiro.com.br
    description: Produção

tags:
  - name: Autenticação
    description: Login, logout e gerenciamento de sessão

paths:
  /auth/login:
    post:
      summary: Autenticar usuário
      description: |
        Valida credenciais (email + senha) e cria um cookie HttpOnly
        `session-token` contendo JWT com dados do usuário e expiração de 8 horas.
      tags: [Autenticação]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login bem-sucedido
          headers:
            Set-Cookie:
              schema:
                type: string
              description: |
                `session-token=<jwt>; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=28800`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      summary: Encerrar sessão
      description: |
        Remove o cookie `session-token` definindo Max-Age=0.
        Não requer body — apenas o cookie HttpOnly da sessão.
      tags: [Autenticação]
      responses:
        '200':
          description: Logout bem-sucedido
          headers:
            Set-Cookie:
              schema:
                type: string
              description: |
                `session-token=; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=0`
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/session:
    get:
      summary: Verificar sessão atual
      description: |
        Lê o cookie `session-token` HttpOnly, valida o JWT
        e retorna os dados do usuário autenticado.
        Retorna 401 se o cookie estiver ausente, inválido ou expirado.
      tags: [Autenticação]
      security:
        - CookieAuth: []
      responses:
        '200':
          description: Sessão válida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          description: Sessão inválida ou expirada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtido via autenticação. Enviado no header Authorization.
    CookieAuth:
      type: apiKey
      in: cookie
      name: session-token
      description: |
        Cookie HttpOnly `session-token` contendo JWT com dados do usuário.
        Enviado automaticamente pelo navegador em todas as requisições.

  schemas:
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@bemcomum.org.br
        password:
          type: string
          minLength: 1
          format: password
          example: '123456'

    LoginResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            email:
              type: string
              format: email
              example: admin@bemcomum.org.br
            name:
              type: string
              example: Administrador

    SessionResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            email:
              type: string
              format: email
              example: admin@bemcomum.org.br
            name:
              type: string
              example: Administrador

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
        cpf:
          type: string
          nullable: true
        telephone:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        massApprovalPermission:
          type: boolean
          default: false

    SessionTokenPayload:
      type: object
      description: Payload do JWT no cookie session-token
      properties:
        user:
          type: object
          properties:
            userId:
              type: integer
            email:
              type: string
            name:
              type: string
            token:
              type: string
              description: Token JWT interno do backend NestJS
        exp:
          type: integer
          description: Timestamp de expiração (Unix epoch em segundos)

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        statusCode:
          type: integer

  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Erro interno do servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
