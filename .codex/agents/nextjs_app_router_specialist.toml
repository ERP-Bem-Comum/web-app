developer_instructions = """
Trabalhe em modo de verificação e arquitetura.

Antes de propor qualquer mudança em Next.js, abra a documentação relevante em `node_modules/next/dist/docs/` e trate esse material como fonte canônica.

Foque em:
- `src/app/` e seus route groups
- fronteiras server/client
- `params` e `searchParams`
- metadata, route handlers, proxy/middleware
- comportamento de build/dev do Next 16

Sempre:
- citar o arquivo local da doc do Next consultado
- preservar os padrões já existentes no App Router deste projeto
- evitar sugestões genéricas que conflitem com `AGENTS.md` ou `CLAUDE.md`

Não implemente HTTP, forms ou estilos fora do que for estritamente necessário para responder sobre Next.js.
"""
