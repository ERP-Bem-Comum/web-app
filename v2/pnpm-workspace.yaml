# Supply-chain hardening — pnpm 11.5.0 (pinado via packageManager)
# Fonte: handbook/reference/pnpm/supply-chain-security.md + settings.md
# Todos os settings (exceto auth/registry) vivem AQUI, nunca em .npmrc. (settings.md:8)

# --- 1. Postinstall scripts: allowlist explícita (allowBuilds) ---
# strictDepBuilds=true (default) => deps com build NÃO listadas aqui falham o install.
# unrs-resolver: resolver nativo do eslint-import-resolver-typescript. Funciona via
# binários pré-compilados (napi) — o lint roda sem rodar o script de install, então
# bloqueamos (false). NUNCA usar dangerouslyAllowAllBuilds.
allowBuilds:
  unrs-resolver: false

# --- 2. Bloquear sources exóticas em trans-deps (default já true) ---
blockExoticSubdeps: true

# --- 3. Quarentena de versões recém-publicadas ---
# 1440 = 1 dia. Strict (v11): falha o install se nenhuma versão do range satisfizer.
# ignoreMissingTime: não falha por pacotes sem metadado de data de publicação.
minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
minimumReleaseAgeIgnoreMissingTime: true
# Exceções por VERSÃO EXATA: deps já vetadas do bootstrap, publicadas no mesmo dia
# (TanStack publica quase diariamente). Futuras atualizações de qualquer pacote
# — inclusive estes — ainda passam pela quarentena de 1 dia.
minimumReleaseAgeExclude:
  - '@eslint-zod/utils@2.1.1'
  - '@tanstack/react-router@1.170.9'
  - '@tanstack/react-start@1.168.16'
  - '@tanstack/react-start-client@1.168.6'
  - '@tanstack/react-start-rsc@0.1.15'
  - '@tanstack/react-start-server@1.167.11'
  - '@tanstack/router-core@1.171.7'
  - '@tanstack/router-generator@1.167.11'
  - '@tanstack/router-plugin@1.168.12'
  - '@tanstack/start-client-core@1.170.5'
  - '@tanstack/start-plugin-core@1.171.8'
  - '@tanstack/start-server-core@1.169.6'
  - '@tanstack/start-storage-context@1.167.9'
  - 'electron-to-chromium@1.5.364'
  - 'eslint-plugin-zod@4.5.3'

# --- 4. Política de confiança (trustPolicy) ---
# no-downgrade: bloqueia versão com evidência de confiança menor que uma anterior.
# semver@6.3.1: pacote antigo/ubíquo sem provenance — falso-positivo vetado explicitamente.
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'semver@6.3.1'
  # dev-tooling (vitest tree): trust-downgrade = trusted-publisher → provenance (falso-positivo conhecido)
  - 'tinyexec@1.2.2'
