# Spec-Kit Extension Hooks — fluxo guiado (NÃO destrutivo)
#
# Todos os hooks são `optional: true`: ao fim/início de uma fase, o assistente
# SUGERE o próximo comando (não executa sozinho). Você mantém o controle.
# Para auto-executar uma transição, troque `optional: true` por `optional: false`
# (aí o assistente emite EXECUTE_COMMAND e roda o comando automaticamente).
#
# Regras (das SKILL.md speckit-*):
#  - `command` usa pontos; vira slash trocando "." por "-" (speckit.plan → /speckit-plan).
#  - `enabled: false` desliga o hook (default = ligado).
#  - `condition` é avaliado pelo executor; deixamos vazio (sempre sugerir).
#
# Fluxo: constitution → specify → (clarify) → plan → (checklist) → tasks → (analyze) → implement

hooks:
  # Ao terminar a SPEC → sugerir clarify (opcional) e o plano.
  after_specify:
    - command: speckit.plan
      enabled: true
      optional: true
      description: "Gerar o plano técnico a partir da spec recém-criada."
      prompt: "A especificação está pronta. Rode /speckit-plan para gerar o plano técnico. Se houver ambiguidades, /speckit-clarify primeiro (opcional)."

  # Ao terminar o PLANO → sugerir a geração de tasks.
  after_plan:
    - command: speckit.tasks
      enabled: true
      optional: true
      description: "Gerar a lista de tasks ordenada por dependência a partir do plano."
      prompt: "O plano está pronto. Rode /speckit-tasks para gerar a tasks.md. (Opcional antes: /speckit-checklist para um checklist sob medida.)"

  # Ao terminar as TASKS → sugerir a análise de consistência cross-artefato.
  after_tasks:
    - command: speckit.analyze
      enabled: true
      optional: true
      description: "Analisar consistência entre spec.md, plan.md e tasks.md antes de implementar."
      prompt: "As tasks foram geradas. Rode /speckit-analyze para checar consistência (spec ↔ plan ↔ tasks) antes de implementar."

  # Antes de IMPLEMENTAR → lembrar de rodar a análise como gate de qualidade.
  before_implement:
    - command: speckit.analyze
      enabled: true
      optional: true
      description: "Gate de qualidade: validar consistência cross-artefato antes de codar."
      prompt: "Antes de implementar, considere rodar /speckit-analyze como gate de qualidade (consistência spec ↔ plan ↔ tasks)."
