name: deploy-qa

# Deploy da QA (VPS Magalu, PBE — ADR-0021) SEM segredo longevo (ADR-0018): o runner entra na tailnet e
# roda o `deploy.sh` do ERP-INFRA na VPS (que faz `docker compose pull` da :qa + up --wait). A VPS NÃO é
# exposta por SSH público. Dispara após o build-publish concluir com sucesso em `develop`, ou manualmente.
#
# PRÉ-REQUISITOS DE INFRA (configurados em 2026-06-25 via Tailscale API):
#   1. ✅ Auth key `tag:ci` (reusable+ephemeral+preauth) → secret `TS_AUTHKEY`. ⚠️ EXPIRA ~90 DIAS
#      (criada 2026-06-25 → expira 2026-09-23): rotacionar antes (nova key tag:ci + re-setar o secret).
#   2. ✅ ACL do tailnet: `ssh` permite `tag:ci` → `tag:cd-target` como `ubuntu`; nó erp-bem-comum-qa = tag:cd-target.
#   3. ✅ Tailscale SSH habilitado na VPS — autenticação por identidade, SEM chave.
#   4. ⚠️ /opt/erp-qa/ provisionado na VPS (compose.yaml + .env + ./secrets via init-secrets.sh) — ERP-INFRA/platform/vps-qa.
#
# Se o deploy falhar no passo SSH/compose, verificar (4) e a validade da auth key (1).

on:
  workflow_run:
    workflows: [build-publish]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-qa
  cancel-in-progress: false # nunca cancelar um deploy em andamento

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Só deploya em disparo manual OU quando o build-publish passou em `develop`.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'develop')
    steps:
      - name: Conectar na tailnet (efêmero, tag:ci)
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          # Auth key já é tag:ci + ephemeral → dispensa oauth/tags. Rotacionar a key ≤90d (ver topo).
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Deploy na VPS via Tailscale SSH (sem chave longeva)
        run: |
          # Identidade via tailnet/ACL (Tailscale SSH) — sem chave SSH armazenada no repo (CICD-SEC-6).
          # deploy.sh: `docker compose pull` da :qa + up --wait; sai !=0 se um container não ficar healthy
          # → este job fica vermelho. Rollback = fixar CORE_API_IMAGE/WEB_IMAGE num digest anterior e re-rodar.
          # Auto-cura de disco: a VPS tem só 10 GB e enche com imagens antigas. Limpa imagens/cache/containers
          # órfãos ANTES do pull — NÃO usa --volumes, então o volume do MySQL fica intacto.
          ssh -o StrictHostKeyChecking=accept-new ubuntu@erp-bem-comum-qa \
            'docker system prune -af && /opt/erp-qa/deploy.sh'

# TODO produção (AWS — ADR-0018): job separado com `permissions.id-token: write` +
# aws-actions/configure-aws-credentials (role-to-assume via OIDC, SEM chave longeva) → deploy no alvo AWS,
# quando a infra de produção (Codebit) estiver provisionada.
