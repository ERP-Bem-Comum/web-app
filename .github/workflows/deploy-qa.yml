name: deploy-qa

# Build da imagem de QA do web-app (front + BFF TanStack Start) e publicação no
# GitHub Container Registry. Dispara em push na branch `develop` (a branch de QA
# deste repo). O deploy na VPS é feito pelo Watchtower (pull-based): quando a tag
# :qa muda no ghcr, a VPS atualiza o container sozinha. O build (pnpm + vite) roda
# aqui no runner — a VPS de QA não compila (ver ERP-INFRA/platform/vps-qa).
#
# Versões das actions conferidas na doc oficial (jun/2026):
#   https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images
#   https://github.com/docker/build-push-action

on:
  push:
    branches: [develop]
    paths-ignore:
      - "**/*.md"
      - "handbook/**"
      - "specs/**"
      - "e2e/**"
  workflow_dispatch:

concurrency:
  group: deploy-qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/erp-bem-comum/bemcomum-web

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login no ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags + labels OCI)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=qa
            type=sha,prefix=sha-,format=short

      - name: Build + push (linux/amd64, target runtime)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./web.Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
