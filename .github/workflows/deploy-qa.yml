name: deploy-qa

# Build da imagem de QA do web-app (front + BFF TanStack Start) e publicação no
# GitHub Container Registry. Dispara em push na branch `develop` (a branch de QA
# deste repo). O deploy na VPS é feito pelo Watchtower (pull-based): quando a tag
# :qa muda no ghcr, a VPS atualiza o container sozinha. O build (pnpm + vite) roda
# aqui no runner — a VPS de QA não compila (ver ERP-INFRA/platform/vps-qa).
#
# Versões das actions conferidas na doc oficial (jun/2026):
#   https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images
#   https://github.com/docker/build-push-action

on:
  push:
    branches: [develop]
    paths-ignore:
      - "**/*.md"
      - "handbook/**"
      - "specs/**"
      - "e2e/**"
  workflow_dispatch:

concurrency:
  group: deploy-qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/erp-bem-comum/bemcomum-web
  # Opta pelo Node 24 nas JS actions (metadata-action@v5 ainda roda em Node 20,
  # deprecado a partir de set/2026). Silencia o aviso de deprecação.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login no ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags + labels OCI)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=qa
            type=sha,prefix=sha-,format=short

      - name: Build + push (linux/amd64, target runtime)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./web.Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy QA via SSH (forced command na VPS)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # A chave está travada (forced command) p/ rodar só /opt/erp-qa/deploy.sh.
          # Se um container não ficar healthy, deploy.sh sai != 0 e este job fica vermelho.
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            ubuntu@201.23.88.83 deploy
