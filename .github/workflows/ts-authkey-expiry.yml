name: ts-authkey-expiry-alert

# Alerta quando a auth key do Tailscale usada no deploy QA (secret TS_AUTHKEY) está perto de expirar.
# Auth keys do Tailscale expiram em ~90 dias; quando expira, o deploy QA quebra no passo "Conectar na
# tailnet" (silencioso até alguém tentar deployar). Este job avisa ANTES, abrindo/comentando uma issue.
#
# Sem segredo novo: usa uma DATA versionada (KEY_EXPIRY). ⚠️ AO ROTACIONAR a key (runbook RB-008),
# ATUALIZE o KEY_EXPIRY abaixo para a nova data de expiração.

on:
  schedule:
    - cron: "17 8 * * 1" # toda segunda ~08:17 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  KEY_EXPIRY: "2026-09-23" # ⚠️ atualizar na rotação (RB-008). Expiração atual da TS_AUTHKEY.
  WARN_DAYS: "14" # avisa quando faltar isto ou menos

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checar expiração e alertar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          today=$(date -u +%s)
          exp=$(date -u -d "$KEY_EXPIRY" +%s)
          days=$(( (exp - today) / 86400 ))
          echo "TS_AUTHKEY expira em $days dia(s) (KEY_EXPIRY=$KEY_EXPIRY)."
          if [ "$days" -gt "$WARN_DAYS" ]; then
            echo "OK — mais de $WARN_DAYS dias. Nada a fazer."
            exit 0
          fi
          if [ "$days" -lt 0 ]; then sev="🔴 JÁ EXPIROU"; else sev="⏰ expira em $days dia(s)"; fi
          body="**TS_AUTHKEY (deploy QA) $sev** — ($KEY_EXPIRY).

          Quando expira, o deploy QA quebra no passo *Conectar na tailnet*. **Rotacione** seguindo o
          **RB-008** do runbook (ERP-INFRA \`docs/runbooks/deploy-and-operations.md\`):
          gerar nova auth key \`tag:ci\` → \`gh secret set TS_AUTHKEY\` → **atualizar KEY_EXPIRY** em
          \`.github/workflows/ts-authkey-expiry.yml\`. Tracker: #92.

          _(alerta automático do workflow ts-authkey-expiry-alert)_"
          # comenta numa issue aberta de rotação se houver; senão cria uma.
          num=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "rotacionar TS_AUTHKEY in:title" --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            echo "Comentando na issue #$num"
            gh issue comment "$num" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            echo "Criando nova issue de alerta"
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "⏰ Rotacionar TS_AUTHKEY — $sev ($KEY_EXPIRY)" --body "$body"
          fi
